name: oracle-integrity

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-groups
      - run: uv run python scripts/check_math_registry.py
      - run: uv run python scripts/validate_schema.py
      - run: uv run python scripts/verify_cases.py
      - run: uv run python scripts/check_replay.py
      - run: uv run python scripts/check_tolerances.py
      - run: uv run python scripts/check_upstream_ad_tolerances.py
